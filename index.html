<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC 实时交易监控中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%); min-height: 100vh; color: #fff; }
        .header { background: rgba(0,0,0,0.3); padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.8em; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-title { font-size: 1.1em; font-weight: 600; }
        .signal-panel { grid-column: 1 / -1; }
        .signal-list { max-height: 400px; overflow-y: auto; }
        .signal-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; background: rgba(0,0,0,0.2); border-radius: 10px; border-left: 4px solid #888; }
        .signal-item.strong-long { border-left-color: #00ff88; background: linear-gradient(90deg, rgba(0,255,136,0.1), transparent); }
        .signal-item.strong-short { border-left-color: #ff4757; background: linear-gradient(90deg, rgba(255,71,87,0.1), transparent); }
        .signal-item.light-long { border-left-color: #ffa502; background: linear-gradient(90deg, rgba(255,165,2,0.1), transparent); }
        .signal-item.light-short { border-left-color: #ffa502; background: linear-gradient(90deg, rgba(255,165,2,0.1), transparent); }
        .signal-time { font-size: 0.75em; color: #888; min-width: 80px; }
        .signal-content { flex: 1; margin: 0 15px; }
        .signal-type { font-weight: 600; }
        .signal-price { font-size: 0.85em; color: #aaa; }
        .signal-strength { padding: 4px 10px; border-radius: 12px; font-size: 0.75em; font-weight: 600; background: rgba(255,255,255,0.1); }
        .account-balance { font-size: 2em; font-weight: 700; }
        .profit { color: #00ff88; }
        .loss { color: #ff4757; }
        .account-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .stat-box { text-align: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .stat-value { font-size: 1.3em; font-weight: 700; }
        .stat-label { font-size: 0.75em; color: #888; margin-top: 4px; }
        .position-badge { padding: 4px 12px; border-radius: 12px; font-size: 0.8em; }
        .badge-long { background: rgba(0,255,136,0.2); color: #00ff88; }
        .badge-short { background: rgba(255,71,87,0.2); color: #ff4757; }
        .badge-empty { background: rgba(136,136,136,0.2); color: #888; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { padding: 12px 20px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { border-bottom-color: #00d4ff; color: #00d4ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .daily-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .daily-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .daily-title { font-size: 0.9em; color: #888; margin-bottom: 10px; }
        .daily-value { font-size: 1.5em; font-weight: 700; }
        .trade-list { max-height: 300px; overflow-y: auto; }
        .trade-item { display: flex; justify-content: space-between; padding: 10px; margin-bottom: 5px; background: rgba(0,0,0,0.15); border-radius: 8px; }
        .trade-win { border-left: 3px solid #00ff88; }
        .trade-loss { border-left: 3px solid #ff4757; }
        .countdown { font-size: 0.85em; color: #ffa502; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>📊 BTC 实时交易监控中心</h1>
            <div style="color: #888;">最后更新: <span id="lastUpdate">--</span></div>
        </div>
    </header>
    
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('dashboard')">📈 实时看板</div>
            <div class="tab" onclick="switchTab('signals')">🚨 信号记录</div>
            <div class="tab" onclick="switchTab('daily')">📅 每日统计</div>
            <div class="tab" onclick="switchTab('trades')">💰 交易记录</div>
        </div>
        
        <div id="dashboard" class="tab-content active">
            <div class="card signal-panel">
                <div class="card-header">
                    <div class="card-title">🚨 实时信号流</div>
                    <span style="font-size: 0.85em; color: #888;">最新 50 条</span>
                </div>
                <div class="signal-list" id="signalList">
                    <div style="text-align: center; color: #666; padding: 40px;">加载中...</div>
                </div>
            </div>
            
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">⚡ 5分钟事件合约</div>
                    </div>
                    <div class="account-balance" id="balance5min">--</div>
                    <div id="pnl5min">--</div>
                    <div class="account-stats">
                        <div class="stat-box">
                            <div class="stat-value" id="trades5min">--</div>
                            <div class="stat-label">总交易</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value profit" id="wins5min">--</div>
                            <div class="stat-label">盈利</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value loss" id="losses5min">--</div>
                            <div class="stat-label">亏损</div>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        状态: <span class="position-badge badge-empty" id="status5min">--</span>
                        <span class="countdown" id="countdown5min"></span>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📅 30分钟固定周期</div>
                    </div>
                    <div class="account-balance" id="balance30min">--</div>
                    <div id="pnl30min">--</div>
                    <div class="account-stats">
                        <div class="stat-box">
                            <div class="stat-value" id="trades30min">--</div>
                            <div class="stat-label">总交易</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value profit" id="wins30min">--</div>
                            <div class="stat-label">盈利</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value loss" id="losses30min">--</div>
                            <div class="stat-label">亏损</div>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        状态: <span class="position-badge badge-empty" id="status30min">--</span>
                        <span class="countdown" id="countdown30min"></span>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="signals" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">🚨 所有信号记录</div>
                    <div style="font-size: 0.85em; color: #888;">
                        <span style="color: #00ff88;">● 强烈做多</span> 
                        <span style="color: #ff4757; margin-left: 10px;">● 强烈做空</span>
                        <span style="color: #ffa502; margin-left: 10px;">● 轻仓</span>
                    </div>
                </div>
                <div class="signal-list" id="allSignals">
                    <div style="text-align: center; color: #666; padding: 40px;">加载中...</div>
                </div>
            </div>
        </div>
        
        <div id="daily" class="tab-content">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📅 今日统计</div>
                    </div>
                    <div id="todayStats">
                        <div class="daily-stats">
                            <div class="daily-card">
                                <div class="daily-title">5分钟模拟盘</div>
                                <div id="today5min">加载中...</div>
                            </div>
                            <div class="daily-card">
                                <div class="daily-title">30分钟模拟盘</div>
                                <div id="today30min">加载中...</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📆 昨日统计</div>
                    </div>
                    <div id="yesterdayStats">
                        <div class="daily-stats">
                            <div class="daily-card">
                                <div class="daily-title">5分钟模拟盘</div>
                                <div id="yesterday5min">加载中...</div>
                            </div>
                            <div class="daily-card">
                                <div class="daily-title">30分钟模拟盘</div>
                                <div id="yesterday30min">加载中...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="trades" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">💰 详细交易记录</div>
                </div>
                <div class="trade-list" id="tradeList">
                    <div style="text-align: center; color: #666; padding: 40px;">加载中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 标签切换
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('accounts.json?t=' + Date.now());
                const data = await response.json();
                updateDashboard(data);
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            } catch (e) {
                console.error('加载数据失败:', e);
            }
        }
        
        // 更新面板
        function updateDashboard(data) {
            // 更新5分钟盘
            if (data['5min']) {
                const acc = data['5min'];
                document.getElementById('balance5min').textContent = acc.current_balance.toFixed(2);
                const pnl = acc.current_balance - acc.initial_balance;
                const pnlEl = document.getElementById('pnl5min');
                pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(2) + ' USDT';
                pnlEl.className = pnl >= 0 ? 'profit' : 'loss';
                
                const closed = acc.trade_history.filter(t => t.type === 'close');
                const wins = closed.filter(t => t.result === 'profit').length;
                const losses = closed.filter(t => t.result === 'loss').length;
                document.getElementById('trades5min').textContent = closed.length;
                document.getElementById('wins5min').textContent = wins;
                document.getElementById('losses5min').textContent = losses;
                
                const statusEl = document.getElementById('status5min');
                const countdownEl = document.getElementById('countdown5min');
                if (acc.active_position) {
                    const isLong = acc.active_position.direction === 'long';
                    statusEl.textContent = isLong ? '做多中' : '做空中';
                    statusEl.className = 'position-badge ' + (isLong ? 'badge-long' : 'badge-short');
                    // 计算剩余时间
                    const opened = new Date(acc.active_position.opened_at);
                    const now = new Date();
                    const elapsed = (now - opened) / 1000 / 60;
                    const remaining = Math.max(0, 5 - elapsed);
                    countdownEl.textContent = ` (剩余 ${remaining.toFixed(1)} 分钟)`;
                } else {
                    statusEl.textContent = '空仓';
                    statusEl.className = 'position-badge badge-empty';
                    countdownEl.textContent = '';
                }
            }
            
            // 更新30分钟盘
            if (data['30min']) {
                const acc = data['30min'];
                document.getElementById('balance30min').textContent = acc.current_balance.toFixed(2);
                const pnl = acc.current_balance - acc.initial_balance;
                const pnlEl = document.getElementById('pnl30min');
                pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(2) + ' USDT';
                pnlEl.className = pnl >= 0 ? 'profit' : 'loss';
                
                const closed = acc.trade_history.filter(t => t.type === 'close');
                const wins = closed.filter(t => t.result === 'profit').length;
                const losses = closed.filter(t => t.result === 'loss').length;
                document.getElementById('trades30min').textContent = closed.length;
                document.getElementById('wins30min').textContent = wins;
                document.getElementById('losses30min').textContent = losses;
                
                const statusEl = document.getElementById('status30min');
                const countdownEl = document.getElementById('countdown30min');
                if (acc.active_position) {
                    const isLong = acc.active_position.direction === 'long';
                    statusEl.textContent = isLong ? '做多中' : '做空中';
                    statusEl.className = 'position-badge ' + (isLong ? 'badge-long' : 'badge-short');
                    // 计算剩余时间
                    const opened = new Date(acc.active_position.opened_at);
                    const now = new Date();
                    const elapsed = (now - opened) / 1000 / 60;
                    const remaining = Math.max(0, 30 - elapsed);
                    countdownEl.textContent = ` (剩余 ${remaining.toFixed(1)} 分钟)`;
                } else {
                    statusEl.textContent = '空仓';
                    statusEl.className = 'position-badge badge-empty';
                    countdownEl.textContent = '';
                }
            }
            
            // 更新信号列表
            updateSignals(data);
            
            // 更新每日统计
            updateDailyStats(data);
            
            // 更新交易记录
            updateTrades(data);
        }
        
        // 更新信号列表
        function updateSignals(data) {
            const signalList = document.getElementById('signalList');
            const allSignals = document.getElementById('allSignals');
            
            // 从 trade_history 中提取信号
            let signals = [];
            ['5min', '30min'].forEach(type => {
                if (data[type] && data[type].trade_history) {
                    data[type].trade_history.forEach(trade => {
                        if (trade.type === 'open') {
                            signals.push({
                                time: trade.timestamp,
                                type: type,
                                direction: trade.direction,
                                price: trade.price,
                                isStrong: true
                            });
                        }
                    });
                }
            });
            
            // 排序并显示
            signals.sort((a, b) => new Date(b.time) - new Date(a.time));
            
            const renderSignal = (s) => {
                const time = new Date(s.time).toLocaleTimeString('zh-CN');
                const isLong = s.direction === 'long';
                const className = s.isStrong ? (isLong ? 'strong-long' : 'strong-short') : (isLong ? 'light-long' : 'light-short');
                const typeText = s.isStrong ? (isLong ? '🔥 强烈做多' : '🔥 强烈做空') : (isLong ? '🟡 轻仓做多' : '🟡 轻仓做空');
                return `
                    <div class="signal-item ${className}">
                        <div class="signal-time">${time}</div>
                        <div class="signal-content">
                            <div class="signal-type">${typeText}</div>
                            <div class="signal-price">${s.type === '5min' ? '⚡ 5分钟' : '📅 30分钟'} | 价格: $${s.price?.toFixed(2) || '--'}</div>
                        </div>
                    </div>
                `;
            };
            
            if (signals.length > 0) {
                signalList.innerHTML = signals.slice(0, 10).map(renderSignal).join('');
                allSignals.innerHTML = signals.map(renderSignal).join('');
            } else {
                signalList.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">等待信号...</div>';
                allSignals.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">暂无信号记录</div>';
            }
        }
        
        // 更新每日统计
        function updateDailyStats(data) {
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            
            ['5min', '30min'].forEach(type => {
                if (!data[type]) return;
                
                const trades = data[type].trade_history.filter(t => t.type === 'close');
                
                // 今日统计
                const todayTrades = trades.filter(t => new Date(t.timestamp).toDateString() === today);
                const todayWins = todayTrades.filter(t => t.result === 'profit').length;
                const todayLosses = todayTrades.filter(t => t.result === 'loss').length;
                const todayProfit = todayTrades.reduce((sum, t) => sum + (t.profit || 0), 0);
                
                document.getElementById(`today${type}`).innerHTML = `
                    <div class="daily-value">${todayTrades.length} 单</div>
                    <div style="color: #00ff88;">✅ 盈利: ${todayWins} 单</div>
                    <div style="color: #ff4757;">❌ 亏损: ${todayLosses} 单</div>
                    <div style="margin-top: 10px; ${todayProfit >= 0 ? 'color: #00ff88;' : 'color: #ff4757;'}">
                        盈亏: ${todayProfit >= 0 ? '+' : ''}${todayProfit.toFixed(2)} USDT
                    </div>
                `;
                
                // 昨日统计
                const yestTrades = trades.filter(t => new Date(t.timestamp).toDateString() === yesterday);
                const yestWins = yestTrades.filter(t => t.result === 'profit').length;
                const yestLosses = yestTrades.filter(t => t.result === 'loss').length;
                const yestProfit = yestTrades.reduce((sum, t) => sum + (t.profit || 0), 0);
                
                if (yestTrades.length > 0) {
                    document.getElementById(`yesterday${type}`).innerHTML = `
                        <div class="daily-value">${yestTrades.length} 单</div>
                        <div style="color: #00ff88;">✅ 盈利: ${yestWins} 单</div>
                        <div style="color: #ff4757;">❌ 亏损: ${yestLosses} 单</div>
                        <div style="margin-top: 10px; ${yestProfit >= 0 ? 'color: #00ff88;' : 'color: #ff4757;'}">
                            盈亏: ${yestProfit >= 0 ? '+' : ''}${yestProfit.toFixed(2)} USDT
                        </div>
                    `;
                } else {
                    document.getElementById(`yesterday${type}`).innerHTML = '<div style="color: #666;">昨日无交易</div>';
                }
            });
        }
        
        // 更新交易记录
        function updateTrades(data) {
            const tradeList = document.getElementById('tradeList');
            let allTrades = [];
            
            ['5min', '30min'].forEach(type => {
                if (data[type] && data[type].trade_history) {
                    data[type].trade_history.forEach(trade => {
                        if (trade.type === 'close') {
                            allTrades.push({
                                ...trade,
                                accountType: type
                            });
                        }
                    });
                }
            });
            
            allTrades.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            if (allTrades.length > 0) {
                tradeList.innerHTML = allTrades.map(t => {
                    const time = new Date(t.timestamp).toLocaleString('zh-CN');
                    const isWin = t.result === 'profit';
                    return `
                        <div class="trade-item ${isWin ? 'trade-win' : 'trade-loss'}">
                            <div>
                                <div>${t.accountType === '5min' ? '⚡ 5分钟' : '📅 30分钟'} | ${t.direction === 'long' ? '做多' : '做空'}</div>
                                <div style="font-size: 0.8em; color: #888;">${time}</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="color: ${isWin ? '#00ff88' : '#ff4757'}; font-weight: 600;">
                                    ${isWin ? '+' : ''}${t.profit?.toFixed(2) || 0} USDT
                                </div>
                                <div style="font-size: 0.8em; color: #888;">
                                    ${t.result === 'profit' ? '✅ 盈利' : '❌ 亏损'}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                tradeList.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">暂无交易记录</div>';
            }
        }
        
        // 初始化加载
        loadData();
        setInterval(loadData, 5000); // 每5秒刷新
    </script>
</body>
</html>
